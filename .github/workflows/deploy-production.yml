name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and deploy to production
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      APP_NAME: ${{ github.event.repository.name }}
      ACR: labsacrprod.azurecr.io
      RESOURCE_GROUP: labs-rg-production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}


      - name: Build and push image
        run: |
          az acr build \
            --registry labsacrprod \
            --image ${{ env.APP_NAME }}:${{ github.sha }} \
            --image ${{ env.APP_NAME }}:latest \
            .

      - name: Deploy to production Container App
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }}-production \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR }}/${{ env.APP_NAME }}:${{ github.sha }} \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
