name: Mark stale issues and PRs

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  stale:
    name: Label and close stale items
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has had no
            activity for 30 days. It will be closed in 7 days unless there is new activity.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has had no
            activity for 30 days. It will be closed in 7 days unless there is new activity.
          close-issue-message: 'Closed due to 37 days of inactivity. Reopen if still relevant.'
          close-pr-message: 'Closed due to 37 days of inactivity. Reopen if still relevant.'
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security'
          exempt-pr-labels: 'pinned,security'
